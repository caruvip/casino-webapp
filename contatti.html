<!DOCTYPE html>
<html lang="it">
<head>
    <title>Contatti</title>
    <link rel="stylesheet" href="/styles/main.css">
    <link rel="stylesheet" href="/styles/contatti.css">
</head>
<body>
    <div class="user-bar" id="userBar"></div>
    <header>
        <h1>CASINO ONLINE</h1>
        <nav>
            <ul>
                <li><a href="/giochi.html">Giochi</a></li>
                <li><a href="/promozioni.html">Promozioni</a></li>
                <li><a href="/chi-siamo.html">Chi Siamo</a></li>
                <li><a href="/contatti.html">Contatti</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <h2>Parla con Noi</h2>
            <div class="contact-wrapper">
                <div class="contact-info-card">
                    <h3 style="color:#FFD700">Supporto VIP</h3>
                    <p>Hai un problema con un deposito o un gioco? Il nostro team e' disponibile 24/7.</p>
                    <p>vip@777casino.it</p>
                    <p>+39 333 000 0000</p>
                </div>
                <div class="form-container">
                    <form>
                        <div class="input-group">
                            <input type="text" required>
                            <label>Nome Utente</label>
                        </div>
                        <div class="input-group">
                            <input type="email" required>
                            <label>Email</label>
                        </div>
                        <div class="input-group">
                            <textarea required rows="4"></textarea>
                            <label>Messaggio</label>
                        </div>
                        <button class="submit-btn">INVIA MESSAGGIO</button>
                    </form>
                </div>
            </div>
        </section>
    </main>
    <footer><p>&copy; 2025 777casino.it</p></footer>
    <script type="module" src="/scripts/supabase-client.js"></script>
    <script src="/scripts/auth.js"></script>
</body>
</html>
